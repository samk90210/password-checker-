<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Trainer</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<button id="settingsBtn">⚙️</button>

<div class="main-card">

<h1>Password Checker</h1>

<div class="mode-row">

<button id="modePassword" class="mode-pill active">Password Mode</button>

<button id="modeGamified" class="mode-pill">Gamified Mode</button>

</div>

<div class="input-wrap">

<input id="password" type="password" placeholder="Enter your password">

<label class="toggle-inline">

<input id="toggle-password" type="checkbox"> Show

</label>

</div>

<div class="small-row">

<button id="copy-btn">📋 Copy</button>

<button id="open-generator-btn">🎲 Generator</button>

<button id="saveHistoryBtn">💾 Save</button>

</div>

<div id="strength-text">Password strength level: —</div>

<div class="progress-bar">

<div id="progress-fill"></div>

</div>

<div id="complexity">Password complexity: —</div>

<div class="ttc">

<div>Online attack: <span id="ttc-1e3"></span></div>

<div>Offline attack: <span id="ttc-1e9"></span></div>

<div>Cluster attack: <span id="ttc-1e12"></span></div>

</div>

</div>

<div id="generator-modal" class="modal">

<div class="modal-content">

<h3>Password Generator</h3>

<label>
Length
<input id="length-slider" type="range" min="8" max="32" value="12">
<span id="length-value">12</span>
</label>

<label>
Numbers
<input id="number-slider" type="range" min="0" max="10" value="2">
<span id="number-value">2</span>
</label>

<label>
Specials
<input id="special-slider" type="range" min="0" max="10" value="2">
<span id="special-value">2</span>
</label>

<div class="row">

<button id="generate-btn">Generate</button>

<button id="generator-cancel">Cancel</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>

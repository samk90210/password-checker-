<!doctype html>
<html lang="en">

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Password Trainer</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<button id="settingsBtn">⚙️</button>

<aside id="settingsPanel">

<button id="closeSettings">✕</button>

<button id="themeToggle">

<span id="themeIcon">☀️</span>

</button>

</aside>

<div id="yt-holder"></div>

<main class="main-card">

<h1>Password Checker</h1>

<div class="mode-row">

<button id="modePassword" class="mode-pill active">Password Mode</button>

<button id="modeGamified" class="mode-pill">Gamified Mode</button>

</div>

<div class="input-wrap">

<input id="password" type="password" placeholder="Enter password">

<label>

<input id="toggle-password" type="checkbox">

Show

</label>

</div>

<div>

<button id="copy-btn">Copy</button>

<button id="open-generator-btn">Generator</button>

<button id="saveHistoryBtn">Save</button>

</div>

<div id="strength-text"></div>

<div class="progress-bar">

<div id="progress-fill"></div>

</div>

<div id="complexity"></div>

<div class="ttc">

<div>Online: <span id="ttc-1e3"></span></div>

<div>Offline: <span id="ttc-1e9"></span></div>

<div>Cluster: <span id="ttc-1e12"></span></div>

</div>

<ul id="requirements"></ul>

</main>

<section id="gamePanel">

<button id="closeGame">Back</button>

<h2>Password Game</h2>

<div id="gameProgress"></div>

<div id="gameQuestion"></div>

<input id="gameAnswer">

<button id="submit-answer-btn">Submit</button>

<button id="skip-btn">Skip</button>

<div id="gameMessage"></div>

</section>

<div id="generator-modal" class="modal">

<div class="modal-content">

<button id="generator-close">✕</button>

<h3>Password Generator</h3>

<label>

Length

<input id="length-slider" type="range" min="8" max="32" value="12">

<span id="length-value"></span>

</label>

<label>

Numbers

<input id="number-slider" type="range" min="0" max="10" value="2">

<span id="number-value"></span>

</label>

<label>

Special

<input id="special-slider" type="range" min="0" max="10" value="2">

<span id="special-value"></span>

</label>

<button id="generate-btn">Generate</button>

<button id="generator-cancel">Cancel</button>

</div>

</div>

<div id="history-modal" class="modal">

<div class="modal-content">

<button id="history-close">✕</button>

<div id="history-list"></div>

<button id="clearHistory">Clear</button>

<button id="downloadHistory">Download</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
